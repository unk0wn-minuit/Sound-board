<!DOCTYPE html>
<html lang="en">
<head>
    <base href="https://cdn.jsdelivr.net/gh/genizy/soundboard@main/">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5521219086088837" crossorigin="anonymous"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coola Mattespel Soundboard</title>
    <script src="sounds.js" type="module"></script>
    <script src="main.js" type="module"></script>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>Soundboard</h1>
            <p>Coola Mattespel</p>
        </div>

        <div id="controls">
            <div class="search-wrap">
                <span class="search-icon"></span>
                <input id="searchInput" type="text" placeholder="Search sounds…">
            </div>
            <button id="toggleFavorites" class="ctrl-btn favorites-toggle">
                ★ Favorites <span class="badge" id="favCount">0</span>
            </button>
            <button id="toggleButton" class="ctrl-btn overlap-toggle">
                <span class="dot"></span> Overlap
            </button>
            <button id="stopButton" class="ctrl-btn stop-btn">
                ■ Stop all
            </button>
        </div>

        <div class="section-label" id="sectionLabel">All sounds</div>
        <div id="soundboard"></div>
    </div>
</body>
</html>
